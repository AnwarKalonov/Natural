<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Natural Code Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              root: "var(--bg-root)",
              surface: "var(--bg-surface)",
              panel: "var(--bg-panel)",
              border: "var(--border-subtle)",
              subtext: "var(--text-secondary)",
              accent: "var(--accent-primary)",
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>
    <style>
      :root {
          --bg-root: #0e1011;
          --bg-surface: #1c1e21;
          --bg-panel: #151719;
          --border-subtle: #2b3035;
          --accent-primary: #0099ff;
          --text-primary: #e6edf3;
          --text-secondary: #8d96a0;
      }
      body {
          font-family: 'Inter', sans-serif;
          background-color: var(--bg-root);
          color: var(--text-primary);
      }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
          width: 6px;
          height: 6px;
      }
      ::-webkit-scrollbar-track {
          background: transparent;
      }
      ::-webkit-scrollbar-thumb {
          background: var(--border-subtle);
          border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
          background: #3f454d;
      }
      
      .preview-shadow {
          box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05), 0 20px 50px -10px rgba(0, 0, 0, 0.8);
      }

      /* 3D Rotate Utilities for File Swap */
      .perspective-1000 {
          perspective: 1000px;
      }
      .rotate-y-90 {
          transform: rotateY(90deg);
      }
      .rotate-y-0 {
          transform: rotateY(0deg);
      }
      .preserve-3d {
          transform-style: preserve-3d;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "three": "https://esm.sh/three@0.160.0",
    "three/": "https://esm.sh/three@0.160.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
